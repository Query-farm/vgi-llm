name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin fastembed's model cache so the warm step, the worker, and actions/cache agree.
  VGI_LLM_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
  FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed_cache

jobs:
  # pytest (offline driver + Arrow batch builders via an injected FakeProvider), ruff,
  # mypy, pydoclint. The embedding tests run the real local ONNX model.
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      # onnxruntime (via fastembed) dynamically loads libomp on macOS.
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: fastembed-${{ runner.os }}-bge-small-en-v1.5
      - name: Warm the embedding model cache
        run: uv run python -c "from vgi_llm import models; models.warm_up()"
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy vgi_llm/
      - name: Docstring lint (pydoclint)
        run: uv run pydoclint --config pyproject.toml vgi_llm/
      - name: Tests
        run: uv run pytest -n auto -q

  # SQLLogic (haybarn) E2E: the worker attached to a real DuckDB with the vgi extension
  # from the community repository. The bind-only schema asserts and the keyless
  # embed/similarity/prompt legs run with no key; the live legs skip without ANTHROPIC_API_KEY.
  e2e:
    name: SQLLogic e2e (haybarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install worker environment
        run: uv sync --extra dev
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: fastembed-Linux-bge-small-en-v1.5
      - name: Warm the embedding model cache
        run: uv run python -c "from vgi_llm import models; models.warm_up()"
      - name: Install the haybarn unittest runner
        run: |
          uv tool install haybarn-unittest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install the vgi community extension
        run: echo "INSTALL vgi FROM community;" | uvx haybarn-cli
      - name: Run SQLLogic suite against the worker
        run: ./run_tests.sh

  # Metadata-quality gate (vgi-lint): scores the worker's catalog/schema/function docs,
  # tags, categories, per-arg docs, and examples. --no-execute keeps it deterministic;
  # live behavior is covered by the e2e job. fail-on info = strict.
  lint:
    name: metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install worker environment
        run: uv sync --extra dev
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: fastembed-Linux-bge-small-en-v1.5
      - name: Warm the embedding model cache
        run: uv run python -c "from vgi_llm import models; models.warm_up()"
      - name: vgi-lint
        run: >
          uvx --prerelease allow --from vgi-lint-check vgi-lint
          "${{ github.workspace }}/bin/vgi-llm-worker"
          --fail-on info --no-execute
